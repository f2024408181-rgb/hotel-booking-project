<!DOCTYPE html>
<html>

<head>
    <title>Hotel Booking</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="card">
        <div class="hero">
            <div class="hero-badge">⭐ Premium Stay</div>
            <h1>Reserve your room</h1>
            <p>Complete the form below and we'll confirm your booking within 24 hours.</p>
        </div>
        <div class="body">
            <form action="/book" method="POST">
                <p class="section">Guest information</p>
                <div class="field">
                    <label>Full name</label>
                    <input type="text" name="full_name" placeholder="John Smith" required>
                </div>
                <div class="row">
                    <div class="field">
                        <label>Email</label>
                        <input type="email" name="email" placeholder="you@email.com" required>
                    </div>
                    <div class="field">
                        <label>Phone</label>
                        <input type="text" name="phone" placeholder="+92 300 0000000" required>
                    </div>
                </div>
                <p class="section">Stay details</p>
                <div class="row">
                    <div class="field">
                        <label>Check-in</label>
                        <input type="date" name="check_in" required>
                    </div>
                    <div class="field">
                        <label>Check-out</label>
                        <input type="date" name="check_out" required>
                    </div>
                </div>
                <div class="row">
                    <div class="field">
                        <label>Room type</label>
                        <select name="room_type">
                            <option>Single</option>
                            <option>Double</option>
                            <option>Suite</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Guests</label>
                        <input type="number" name="guests" placeholder="2" min="1" max="10">
                    </div>
                </div>
                <p class="section">Special requests</p>
                <div class="field">
                    <label>Any requests or preferences?</label>
                    <textarea name="requests"
                        placeholder="Dietary needs, room preferences, accessibility..."></textarea>
                </div>
                <button type="submit">Complete Booking</button>
            </form>
        </div>
    </div>
</body>

</html>
